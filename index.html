<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css" integrity="sha512-HK5fgLBL+xu6dm/Ii3z4xhlSUyZgTT9tuc/hSrtw6uzJOvgRr2a9jyxxT1ely+B+xFAmJKVSTbpM/CuL7qxO8w==" crossorigin="anonymous" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/base.css">
    <link rel="stylesheet" href="./assets/css/main.css">
</head>

<body>
    <div class="app">
        <header class="header">
            <div class="grid">
                <nav class="header__navbar">
                    <ul class="header__navbar-list">
                        <li class="header__navbar-item header__navbar-item--has-qr header__navbar-item--separate">
                            Vào cửa hàng trên ứng dụng ABC-Shop

                            <!-- Header QR Code -->
                            <div class="header__qr">
                                <img src="./assets/img/qrcode.png" alt="QR code" class="header__qr-img">
                                <div class="header__qr-apps">
                                    <a href="" class="header__qr-link">
                                        <img src="./assets/img/ch_play.png" alt="CH Play" class="header__qr-download-img">
                                    </a>
                                    <a href="" class="header__qr-link">
                                        <img src="./assets/img/app_store.png" alt="App Store" class="header__qr-download-img">
                                    </a>
                                </div>
                            </div>
                        </li>
                        <li class="header__navbar-item">
                            <span class="header__navbar-title--no-pointer">Kết nối</span>
                            <a href="#" class="header__navbar-icon-link"><i class="heaer__navbar-icon fab fa-facebook"></i></a>
                            <a href="#" class="header__navbar-icon-link"><i class="heaer__navbar-icon fab fa-instagram"></i></a>
                        </li>
                    </ul>
                        
                    <ul class="header__navbar-list">
                        <li class="header__navbar-item header__navbar-item-notify">
                            <a href="#" class="header__navbar-item-link">
                            <i class="heaer__navbar-icon fas fa-bell"></i>
                            Thông báo
                            </a>
                            <!-- Notification -->
                            <div class="header__notify">
                                <div class="header__notify-up">
                                    <img src="./assets/img/notyfi.png" alt="Notify" class="header__notify-img">
                                    <p class="header__notify-mess">Đăng nhập để xem thông báo</p>
                                </div>

                                <div class="header__notyfi-down">
                                    <ul class="header__notyfi-login-list">
                                        <li class="header__notyfi-login-item">
                                            <a href="" class="header__notyfi-login-link">Đăng ký</a>
                                        </li>
                                        <li class="header__notyfi-login-item">
                                            <a href="" class="header__notyfi-login-link">Đăng nhập</a>
                                        </li>
                                    </ul>
                                </div>
                            </div>
                        </li>
                        <li class="header__navbar-item">
                            <a href="#" class="header__navbar-item-link">
                                <i class="heaer__navbar-icon far fa-question-circle"></i>
                                Trợ giúp
                            </a>
                        </li>
                        <li class="header__navbar-item header__navbar-item--strong header__navbar-item--separate">Đăng ký</li>
                        <li class="header__navbar-item header__navbar-item--strong">Đăng nhập</li>
                    </ul>
                </nav>
            </div>
        </header>

        <div class="container">

        </div>

        <footer class="footer">

        </footer>
    </div>
</body>

</html>
